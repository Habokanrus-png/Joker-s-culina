<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Support | Joker's Culina</title>
    <style>
        :root { --bg: #1a0b2e; --accent: #ffd700; --glass: rgba(255, 255, 255, 0.05); --text: #ffffff; --text-dim: #b3a2c7; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; padding: calc(env(safe-area-inset-top) + 70px) 20px 40px; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; }
        .nav { display: flex; justify-content: space-around; background: var(--glass); backdrop-filter: blur(20px); padding: 12px; border-radius: 25px; border: 1px solid rgba(255, 215, 0, 0.2); }
        .nav a { text-decoration: none; color: var(--text-dim); font-size: 14px; padding: 8px 12px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; padding: 40px; text-align: center; backdrop-filter: blur(25px); }
        h1 { font-size: 24px; color: var(--accent); }
        .contact-email { color: var(--text); font-size: 20px; font-weight: bold; margin: 25px 0; display: block; text-decoration: none; border-bottom: 2px solid var(--accent); padding-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="marketing.html">Marketing</a>
            <a href="privacy.html">Privacy</a>
            <a href="support.html" style="color: var(--accent); font-weight: bold;">Support</a>
        </div>

        <div class="card">
            <h1>Need Support?</h1>
            <p>I value your feedback and am here to help with any questions or issues you may have with Joker's Culina.</p>
            <a href="mailto:habokanrus@icloud.com" class="contact-email">habokanrus@icloud.com</a>
            <p style="font-size: 14px; opacity: 0.7;">Expected response time: Within 24-48 hours.</p>
        </div>
    </div>
</body>
</html>
