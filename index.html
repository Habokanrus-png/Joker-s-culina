<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ruslana Habokan | Joker's Culina - Jewel Joker</title>
    <style>
        :root {
            --bg: #1a0b2e;
            --accent: #ffd700; /* Gold */
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-dim: #b3a2c7;
        }
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(255, 215, 0, 0.1), transparent 400px),
                              radial-gradient(circle at bottom left, rgba(147, 51, 234, 0.2), transparent 500px);
            color: var(--text);
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            width: 100%; max-width: 500px;
            padding-top: calc(env(safe-area-inset-top) + 70px); 
            padding-bottom: 40px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 20px; padding-left: 20px; padding-right: 20px;
        }
        .nav {
            display: flex; justify-content: space-around;
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 12px; border-radius: 25px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            position: sticky; top: 70px; z-index: 100;
        }
        .nav a {
            text-decoration: none; color: var(--text-dim); font-size: 14px;
            padding: 8px 12px; border-radius: 15px; transition: 0.3s;
        }
        .nav a.active { background: rgba(255, 215, 0, 0.15); color: var(--accent); font-weight: bold; }
        
        .card {
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px; padding: 35px; text-align: center; backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .app-icon {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border-radius: 22px; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 45px; box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }
        h1 { font-size: 22px; margin: 0; color: var(--accent); line-height: 1.3; }
        .dev-label { font-size: 14px; color: var(--text-dim); margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .content { margin-top: 25px; line-height: 1.6; color: var(--text-dim); font-size: 16px; }
        .action-btn {
            background: var(--accent); color: #1a0b2e;
            padding: 18px; border-radius: 20px; text-decoration: none;
            font-weight: 800; text-align: center; margin-top: 10px;
            transition: 0.3s; box-shadow: 0 8px 20px rgba(255, 215, 0, 0.2);
        }
        .action-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="index.html" class="active">Home</a>
            <a href="marketing.html">Marketing</a>
            <a href="privacy.html">Privacy</a>
            <a href="support.html">Support</a>
        </div>

        <div class="card">
            <div class="app-icon">🃏</div>
            <h1>Joker's Culina - Jewel Joker</h1>
            <div class="dev-label">By Ruslana Habokan</div>
            <div class="content">
                <p>Welcome to the official developer portal for <strong>Joker's Culina - Jewel Joker</strong>. I am dedicated to creating immersive and high-quality mobile experiences that bring joy and value to your device.</p>
            </div>
        </div>

        <a href="marketing.html" class="action-btn">Meet the Developer</a>
    </div>
</body>
</html>
